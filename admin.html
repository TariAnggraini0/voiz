<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Voiz</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── Admin Layout ─────────────────────────────────────── */
    .admin-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 64px); }

    /* Sidebar */
    .admin-sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      position: sticky; top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .sidebar-section { padding: .5rem 1rem; margin-bottom: .25rem; }
    .sidebar-label { font-size: .7rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .07em; padding: .5rem 1rem .25rem; }
    .sidebar-item {
      display: flex; align-items: center; gap: .6rem;
      padding: .6rem 1rem;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
      margin: 0 .5rem;
      border: none; background: none; width: calc(100% - 1rem); text-align: left;
    }
    .sidebar-item:hover { background: var(--bg-elevated); color: var(--text); }
    .sidebar-item.active { background: var(--accent-glow); color: var(--accent); }

    /* ── Main Content ─────────────────────────────────────── */
    .admin-content { padding: 2rem; overflow-y: auto; }

    /* Views */
    .view { display: none; }
    .view.active { display: block; }

    /* Stat Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--border-light); }
    .stat-card-num {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 700;
      line-height: 1;
    }
    .stat-card-label { font-size: .82rem; color: var(--text-muted); margin-top: .4rem; }
    .stat-card-icon  { font-size: 1.5rem; margin-bottom: .5rem; }

    /* Charts row */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem; margin-bottom: 2rem;
    }
    .chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }

    /* Table */
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      text-align: left; padding: .75rem 1rem;
      font-size: .78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: .85rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: .88rem;
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--bg-elevated); }

    /* Status select inline */
    .status-select {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: .3rem .5rem;
      font-size: .82rem;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar { display: none; }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">🎤 <span>Voiz</span></a>
  <div style="font-size:.82rem;color:var(--text-muted);">Admin Dashboard</div>
  <div class="navbar-actions">
    <span id="adminName" style="font-size:.85rem;color:var(--text-muted);"></span>
    <button class="btn btn-ghost btn-sm" onclick="Auth.clear();window.location.href='login.html'">Keluar</button>
  </div>
</nav>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-label">Menu</div>
    <button class="sidebar-item active" onclick="showView('overview', this)">📊 Overview</button>
    <button class="sidebar-item" onclick="showView('aspirasi', this)">📋 Kelola Aspirasi</button>
    <button class="sidebar-item" onclick="showView('notifikasi', this)">🔔 Notifikasi</button>

    <div class="sidebar-label" style="margin-top:1rem;">Filter Cepat</div>
    <button class="sidebar-item" onclick="filterByStatus('menunggu')">⏳ Menunggu</button>
    <button class="sidebar-item" onclick="filterByStatus('diproses')">⚙️ Diproses</button>
    <button class="sidebar-item" onclick="filterByStatus('selesai')">✅ Selesai</button>

    <div style="padding:1rem;margin-top:auto;">
      <a href="dashboard.html" class="btn btn-ghost w-full" style="font-size:.82rem;">👁 Lihat Sebagai User</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-content">

    <!-- ── Overview View ────────────────────────────────── -->
    <div class="view active" id="view-overview">
      <h2 style="margin-bottom:1.5rem;">Overview</h2>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="spinner"></div></div>
      </div>

      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Tren Aspirasi (6 Bulan)</div>
          <canvas id="trendChart" height="200"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Distribusi per Kategori</div>
          <canvas id="katChart" height="200"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">🏆 Top 5 Aspirasi (by Vote)</div>
        <div id="topVoteList" style="margin-top:.5rem;"></div>
      </div>
    </div>

    <!-- ── Aspirasi View ─────────────────────────────────── -->
    <div class="view" id="view-aspirasi">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
        <h2>Kelola Aspirasi</h2>
        <div style="display:flex;gap:.6rem;align-items:center;">
          <select class="form-control" id="adminStatusFilter" style="width:150px;" onchange="loadAdminAspirasi()">
            <option value="">Semua Status</option>
            <option value="menunggu">Menunggu</option>
            <option value="diterima">Diterima</option>
            <option value="diproses">Diproses</option>
            <option value="selesai">Selesai</option>
            <option value="ditolak">Ditolak</option>
          </select>
        </div>
      </div>

      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Aspirasi</th>
              <th>Kategori</th>
              <th>Pengirim</th>
              <th>Vote</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="adminAspirasiBody">
            <tr><td colspan="6" class="text-center text-muted" style="padding:2rem;">Memuat…</td></tr>
          </tbody>
        </table>
      </div>
      <div id="adminPagination" class="pagination" style="margin-top:1.25rem;"></div>
    </div>

    <!-- ── Notifikasi View ───────────────────────────────── -->
    <div class="view" id="view-notifikasi">
      <h2 style="margin-bottom:1.5rem;">Notifikasi</h2>
      <div id="adminNotifList" style="display:flex;flex-direction:column;gap:.6rem;">
        <div class="text-muted text-center" style="padding:2rem;">Memuat…</div>
      </div>
    </div>

  </main>
</div>

<!-- Modal Update Status -->
<div id="statusModal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width:460px;">
    <button class="modal-close" onclick="document.getElementById('statusModal').style.display='none'">✕</button>
    <h3 style="margin-bottom:1.25rem;">Update Status Aspirasi</h3>
    <div id="statusModalContent"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
