<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirim Aspirasi — Voiz</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">🎤 <span>Voiz</span></a>
  <ul class="navbar-links">
    <li><a href="dashboard.html">Semua Aspirasi</a></li>
    <li><a href="kirim-aspirasi.html" class="active">Kirim Aspirasi</a></li>
  </ul>
</nav>

<div style="max-width:680px;margin:3rem auto;padding:0 1.5rem 4rem;">
  <a href="dashboard.html" style="color:gray;font-size:.85rem;">← Kembali</a>
  <h1 style="margin-top:.75rem;">✍️ Kirim Aspirasi</h1>
  <p style="color:gray;">Sampaikan aspirasi atau pengaduanmu kepada pihak kampus.</p>

  <div style="background:#1e2030;border:1px solid #333;border-radius:12px;padding:2rem;margin-top:1.5rem;">
    <div id="formError" style="display:none;padding:.75rem;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;color:#f87171;margin-bottom:1rem;"></div>

    <div style="margin-bottom:1.25rem;">
      <label style="display:block;margin-bottom:.5rem;font-weight:500;">Pilih Kategori *</label>
      <div id="kategoriGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.5rem;">
        <button type="button" onclick="pilihKat(1,this)" style="padding:.75rem;border:2px solid #444;border-radius:8px;background:none;color:gray;cursor:pointer;">📖 Akademik</button>
        <button type="button" onclick="pilihKat(2,this)" style="padding:.75rem;border:2px solid #444;border-radius:8px;background:none;color:gray;cursor:pointer;">🏢 Fasilitas</button>
        <button type="button" onclick="pilihKat(3,this)" style="padding:.75rem;border:2px solid #444;border-radius:8px;background:none;color:gray;cursor:pointer;">👥 Sosial</button>
        <button type="button" onclick="pilihKat(4,this)" style="padding:.75rem;border:2px solid #444;border-radius:8px;background:none;color:gray;cursor:pointer;">💸 Keuangan</button>
        <button type="button" onclick="pilihKat(5,this)" style="padding:.75rem;border:2px solid #444;border-radius:8px;background:none;color:gray;cursor:pointer;">📌 Lainnya</button>
      </div>
    </div>

    <div style="margin-bottom:1rem;">
      <label style="display:block;margin-bottom:.5rem;font-weight:500;">Judul Aspirasi *</label>
      <input id="judul" type="text" maxlength="200" placeholder="Ringkasan singkat aspirasi/pengaduanmu…" style="width:100%;padding:.75rem;background:#252836;border:1px solid #444;border-radius:8px;color:white;font-size:1rem;box-sizing:border-box;"/>
    </div>

    <div style="margin-bottom:1rem;">
      <label style="display:block;margin-bottom:.5rem;font-weight:500;">Detail Aspirasi *</label>
      <textarea id="isi" rows="6" placeholder="Jelaskan aspirasi atau pengaduanmu secara detail…" style="width:100%;padding:.75rem;background:#252836;border:1px solid #444;border-radius:8px;color:white;font-size:1rem;box-sizing:border-box;resize:vertical;"></textarea>
    </div>

    <div style="margin-bottom:1.5rem;">
      <label style="display:flex;align-items:center;gap:.75rem;padding:1rem;background:#252836;border:1px solid #444;border-radius:8px;cursor:pointer;">
        <input type="checkbox" id="isAnonim" style="width:18px;height:18px;"/>
        <span>🎭 Kirim Secara Anonim</span>
      </label>
    </div>

    <div style="display:flex;gap:.75rem;">
      <a href="dashboard.html" style="padding:.75rem 1.5rem;border:1px solid #444;border-radius:8px;color:gray;text-decoration:none;">Batal</a>
      <button onclick="kirimAspirasi()" id="submitBtn" style="flex:1;padding:.75rem;background:#f5a623;border:none;border-radius:8px;color:black;font-weight:700;font-size:1rem;cursor:pointer;">🚀 Kirim Aspirasi</button>
    </div>
  </div>
</div>

<script>
let selectedKat = null;

// TAMBAH INI ↓
if (!localStorage.getItem('voiz_token')) {
  window.location.href = 'login.html?redirect=kirim-aspirasi.html';
}

function pilihKat(id, el) {
  document.querySelectorAll('#kategoriGrid button').forEach(b => {
    b.style.borderColor = '#444';
    b.style.color = 'gray';
  });
  el.style.borderColor = '#f5a623';
  el.style.color = '#f5a623';
  selectedKat = id;
}

async function kirimAspirasi() {
  const errBox = document.getElementById('formError');
  const btn = document.getElementById('submitBtn');
  const judul = document.getElementById('judul').value.trim();
  const isi = document.getElementById('isi').value.trim();
  const anonim = document.getElementById('isAnonim').checked;

  errBox.style.display = 'none';

  if (!selectedKat) { errBox.textContent = '⚠️ Pilih kategori dulu.'; errBox.style.display = 'block'; return; }
  if (!judul) { errBox.textContent = '⚠️ Judul tidak boleh kosong.'; errBox.style.display = 'block'; return; }
  if (!isi) { errBox.textContent = '⚠️ Detail tidak boleh kosong.'; errBox.style.display = 'block'; return; }

  const token = localStorage.getItem('voiz_token');
  if (!token) { window.location.href = 'login.html'; return; }

  btn.disabled = true;
  btn.textContent = 'Mengirim…';

  try {
    const res = await fetch('/api/aspirasi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ judul, isi, kategori_id: selectedKat, is_anonim: anonim })
    });
    const data = await res.json();

    if (data.success) {
      document.body.innerHTML = `<div style="text-align:center;padding:5rem 2rem;"><div style="font-size:4rem;">🎉</div><h2 style="margin:1rem 0;">Aspirasi Terkirim!</h2><p style="color:gray;">Aspirasi kamu akan segera ditinjau.</p><a href="dashboard.html" style="display:inline-block;margin-top:1.5rem;padding:.75rem 2rem;background:#f5a623;border-radius:8px;color:black;text-decoration:none;font-weight:700;">Lihat Dashboard</a></div>`;
    } else {
      errBox.textContent = '❌ ' + (data.message || 'Gagal mengirim.');
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '🚀 Kirim Aspirasi';
    }
  } catch(e) {
    errBox.textContent = '❌ Tidak dapat terhubung ke server.';
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🚀 Kirim Aspirasi';
  }
}
</script>
</body>
</html>
