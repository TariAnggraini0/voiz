<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirim Aspirasi — Voiz</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <style>
    .kirim-wrapper {
      max-width: 680px;
      margin: 3rem auto;
      padding: 0 1.5rem 4rem;
    }
    .kirim-header { margin-bottom: 2rem; }
    .kirim-header h1 { font-size: 1.8rem; }
    .kirim-header p  { color: var(--text-muted); margin-top: .4rem; }

    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }

    .kategori-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .6rem;
    }
    .kategori-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      padding: .9rem .5rem;
      border: 2px solid var(--border-light);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .2s;
      font-size: .85rem;
      font-weight: 500;
      text-align: center;
      color: var(--text-muted);
      background: none;
      font-family: inherit;
    }
    .kategori-option:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }
    .kategori-option.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
    .kategori-icon { font-size: 1.6rem; }

    .anonim-toggle {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color .2s;
      user-select: none;
    }
    .anonim-toggle:hover { border-color: var(--accent); }
    .anonim-info h4 { font-size: .95rem; margin-bottom: .15rem; }
    .anonim-info p  { font-size: .82rem; color: var(--text-muted); }

    .char-count {
      font-size: .78rem;
      color: var(--text-dim);
      text-align: right;
      margin-top: .25rem;
    }
    .char-count.warn { color: var(--status-diproses); }

    .success-state {
      text-align: center;
      padding: 3rem 1rem;
    }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }

    /* Login wall */
    .login-wall {
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .login-wall .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .login-wall h3    { margin-bottom: .5rem; }
    .login-wall p     { color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Navbar user info */
    .nav-user-info {
      display: flex; align-items: center; gap: .45rem;
    }
    .nav-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent-glow);
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-size: .72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">🎤 <span>Voiz</span></a>

  <ul class="navbar-links">
    <li><a href="dashboard.html">Semua Aspirasi</a></li>
    <li><a href="kirim-aspirasi.html" class="active">Kirim Aspirasi</a></li>
  </ul>

  <div class="navbar-actions" id="navActions">
    <!-- diisi JS -->
  </div>
</nav>

<!-- Main -->
<div class="kirim-wrapper">
  <div class="kirim-header">
    <a href="dashboard.html" style="color:var(--text-muted);font-size:.85rem;">← Kembali</a>
    <h1 style="margin-top:.75rem;">✍️ Kirim Aspirasi</h1>
    <p>Sampaikan aspirasi atau pengaduanmu kepada pihak kampus secara terstruktur.</p>
  </div>

  <!-- Konten utama — diisi JS sesuai status login -->
  <div id="mainContent">
    <div class="flex-center" style="padding:3rem;">
      <div class="spinner" style="width:28px;height:28px;border-width:3px;"></div>
    </div>
  </div>
</div>

<!-- ── Script ── -->
<script>
// ─────────────────────────────────────────────────────────────
//  Inline: Auth & Api minimal (tidak bergantung file eksternal)
//  agar halaman tetap jalan saat dibuka file:/// maupun server
// ─────────────────────────────────────────────────────────────

// ── Config ──────────────────────────────────────────────────
const API_BASE = 'http://localhost:5000/api';

// ── Auth helper ──────────────────────────────────────────────
const Auth = {
  getToken:  ()         => localStorage.getItem('voiz_token'),
  getUser:   ()         => JSON.parse(localStorage.getItem('voiz_user') || 'null'),
  save:      (t, u)     => { localStorage.setItem('voiz_token', t); localStorage.setItem('voiz_user', JSON.stringify(u)); },
  clear:     ()         => { localStorage.removeItem('voiz_token'); localStorage.removeItem('voiz_user'); },
  isLoggedIn:()         => !!localStorage.getItem('voiz_token'),
};

// ── Fetch wrapper ────────────────────────────────────────────
async function apiRequest(method, endpoint, data = null) {
  const headers = { 'Content-Type': 'application/json' };
  const token   = Auth.getToken();
  if (token) headers['Authorization'] = `Bearer ${token}`;

  const config = { method, headers };
  if (data)    config.body = JSON.stringify(data);

  try {
    const res  = await fetch(`${API_BASE}${endpoint}`, config);
    const json = await res.json();
    if (res.status === 401) { Auth.clear(); renderLoginWall(); return null; }
    return json;
  } catch (err) {
    return { success: false, message: 'Tidak dapat terhubung ke server. Pastikan backend berjalan.' };
  }
}

// ── Toast ────────────────────────────────────────────────────
function toast(message, type = 'info') {
  const icons     = { success: '✅', error: '❌', info: 'ℹ️' };
  const container = document.getElementById('toast-container');
  const el        = document.createElement('div');
  el.className    = `toast ${type}`;
  el.innerHTML    = `<span>${icons[type]}</span><span>${message}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity   = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition= 'all .3s';
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

// ── Inisial nama untuk avatar ────────────────────────────────
function getInitials(nama) {
  if (!nama) return '?';
  return nama.trim().split(/\s+/).slice(0, 2).map(w => w[0]?.toUpperCase() || '').join('');
}

// ── Navbar ───────────────────────────────────────────────────
function initNavbar() {
  const navActions = document.getElementById('navActions');
  if (!navActions) return;

  if (Auth.isLoggedIn()) {
    const user    = Auth.getUser();
    const isAdmin = user?.role === 'admin' || user?.role === 'pimpinan';
    navActions.innerHTML = `
      <div class="nav-user-info">
        <div class="nav-avatar">${getInitials(user?.nama)}</div>
        <span style="font-size:.85rem;color:var(--text-muted);">${user?.nama?.split(' ')[0] || 'User'}</span>
      </div>
      <a href="${isAdmin ? 'admin.html' : 'dashboard.html'}" class="btn btn-ghost btn-sm">
        ${isAdmin ? '⚙️ Admin' : '📋 Dashboard'}
      </a>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Keluar</button>
    `;
  } else {
    navActions.innerHTML = `
      <a href="login.html"    class="btn btn-ghost btn-sm">Login</a>
      <a href="register.html" class="btn btn-primary btn-sm">Daftar</a>
    `;
  }
}

function doLogout() {
  if (!confirm('Yakin ingin keluar?')) return;
  Auth.clear();
  window.location.href = 'login.html';
}

// ─────────────────────────────────────────────────────────────
//  RENDER: Login Wall (jika belum login)
// ─────────────────────────────────────────────────────────────
function renderLoginWall() {
  document.getElementById('mainContent').innerHTML = `
    <div class="form-card">
      <div class="login-wall">
        <div class="icon">🔒</div>
        <h3>Login Diperlukan</h3>
        <p>Kamu harus login terlebih dahulu untuk mengirim aspirasi.</p>
        <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;">
          <a href="login.html"    class="btn btn-primary">Login</a>
          <a href="register.html" class="btn btn-ghost">Daftar Dulu</a>
        </div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
//  RENDER: Form Kirim Aspirasi
// ─────────────────────────────────────────────────────────────
async function renderForm() {
  document.getElementById('mainContent').innerHTML = `
    <div class="form-card" id="formCard">
      <form id="aspirasiForm">

        <!-- Kategori -->
        <div class="form-group">
          <label class="form-label">Pilih Kategori *</label>
          <div class="kategori-grid" id="kategoriGrid">
            <div class="text-muted text-sm">Memuat kategori…</div>
          </div>
        </div>

        <!-- Judul -->
        <div class="form-group" style="margin-top:1.25rem;">
          <label class="form-label">Judul Aspirasi *</label>
          <input
            type="text" id="judul" class="form-control"
            placeholder="Ringkasan singkat aspirasi/pengaduanmu…"
            maxlength="200" required/>
          <div class="char-count" id="judulCount">0 / 200</div>
        </div>

        <!-- Isi -->
        <div class="form-group" style="margin-top:1rem;">
          <label class="form-label">Detail Aspirasi *</label>
          <textarea
            id="isi" class="form-control" rows="6"
            placeholder="Jelaskan aspirasi atau pengaduanmu secara detail. Semakin jelas, semakin mudah ditindaklanjuti."
            required></textarea>
          <div class="char-count" id="isiCount">0 karakter</div>
        </div>

        <!-- Mode Anonim -->
        <div style="margin-top:1.25rem;">
          <label class="form-label">Mode Pengiriman</label>
          <label class="anonim-toggle" id="anonimToggle">
            <input type="checkbox" id="isAnonim"
                   style="width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;"/>
            <span style="font-size:1.5rem;">🎭</span>
            <div class="anonim-info">
              <h4>Kirim Secara Anonim</h4>
              <p>Identitasmu tidak akan ditampilkan kepada siapa pun, termasuk admin.</p>
            </div>
          </label>
        </div>

        <!-- Error box -->
        <div id="formError" style="
          display:none; margin-top:1rem;
          padding:.75rem 1rem;
          background:rgba(248,113,113,.1);
          border:1px solid rgba(248,113,113,.3);
          border-radius:var(--radius-sm);
          color:var(--red);
          font-size:.88rem;
        "></div>

        <!-- Actions -->
        <div style="display:flex;gap:.75rem;margin-top:1.75rem;">
          <a href="dashboard.html" class="btn btn-ghost">Batal</a>
          <button type="submit" class="btn btn-primary" style="flex:1;" id="submitBtn">
            🚀 Kirim Aspirasi
          </button>
        </div>

      </form>
    </div>
  `;

  // Load kategori
  await loadKategori();

  // Char counter — judul
  document.getElementById('judul').addEventListener('input', function () {
    const el      = document.getElementById('judulCount');
    el.textContent = `${this.value.length} / 200`;
    el.className  = `char-count${this.value.length > 180 ? ' warn' : ''}`;
  });

  // Char counter — isi
  document.getElementById('isi').addEventListener('input', function () {
    document.getElementById('isiCount').textContent = `${this.value.length} karakter`;
  });

  // Submit
  document.getElementById('aspirasiForm').addEventListener('submit', handleSubmit);
}

// ─────────────────────────────────────────────────────────────
//  LOAD KATEGORI
// ─────────────────────────────────────────────────────────────
let selectedKategoriId = null;

const iconMap = {
  'book-open':        '📖',
  'building-2':       '🏢',
  'users':            '👥',
  'banknote':         '💸',
  'more-horizontal':  '⋯',
};

// Fallback kategori jika backend belum jalan
const fallbackKategori = [
  { id: 1, nama: 'Akademik',  icon: 'book-open',       warna: '#6366f1' },
  { id: 2, nama: 'Fasilitas', icon: 'building-2',      warna: '#f59e0b' },
  { id: 3, nama: 'Sosial',    icon: 'users',            warna: '#10b981' },
  { id: 4, nama: 'Keuangan',  icon: 'banknote',         warna: '#ef4444' },
  { id: 5, nama: 'Lainnya',   icon: 'more-horizontal',  warna: '#8b5cf6' },
];

async function loadKategori() {
  const grid = document.getElementById('kategoriGrid');
  if (!grid) return;

  let kategoriData = fallbackKategori; // default pakai fallback

  try {
    const res = await apiRequest('GET', '/aspirasi/kategori');
    if (res?.success && res.data?.length) {
      kategoriData = res.data;
    }
  } catch (_) {
    // backend belum jalan, pakai fallback
  }

  grid.innerHTML = kategoriData.map(k => `
    <button
      type="button"
      class="kategori-option"
      onclick="selectKategori(${k.id}, this)"
      data-id="${k.id}"
    >
      <span class="kategori-icon">${iconMap[k.icon] || '📌'}</span>
      <span>${k.nama}</span>
    </button>
  `).join('');
}

function selectKategori(id, el) {
  document.querySelectorAll('.kategori-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedKategoriId = id;
  // Hapus pesan error kategori jika ada
  const errBox = document.getElementById('formError');
  if (errBox && errBox.textContent.includes('kategori')) {
    errBox.style.display = 'none';
  }
}

// ─────────────────────────────────────────────────────────────
//  SUBMIT
// ─────────────────────────────────────────────────────────────
async function handleSubmit(e) {
  e.preventDefault();

  const errBox  = document.getElementById('formError');
  const btn     = document.getElementById('submitBtn');
  const judul   = document.getElementById('judul').value.trim();
  const isi     = document.getElementById('isi').value.trim();
  const anonim  = document.getElementById('isAnonim').checked;

  errBox.style.display = 'none';

  // Validasi kategori
  if (!selectedKategoriId) {
    errBox.textContent   = '⚠️ Pilih kategori terlebih dahulu.';
    errBox.style.display = 'block';
    document.getElementById('kategoriGrid').scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // Validasi judul
  if (!judul) {
    errBox.textContent   = '⚠️ Judul aspirasi tidak boleh kosong.';
    errBox.style.display = 'block';
    return;
  }

  // Validasi isi
  if (!isi) {
    errBox.textContent   = '⚠️ Detail aspirasi tidak boleh kosong.';
    errBox.style.display = 'block';
    return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Mengirim…';

  const res = await apiRequest('POST', '/aspirasi', {
    judul,
    isi,
    kategori_id: selectedKategoriId,
    is_anonim:   anonim,
  });

  if (res?.success) {
    // Tampilkan halaman sukses
    document.getElementById('formCard').innerHTML = `
      <div class="success-state">
        <div class="success-icon">🎉</div>
        <h2>Aspirasi Terkirim!</h2>
        <p class="text-muted" style="margin-top:.5rem;max-width:380px;margin-left:auto;margin-right:auto;line-height:1.7;">
          Aspirasi kamu telah diterima dan akan segera ditinjau oleh tim kami.
          Pantau statusnya di dashboard.
        </p>
        <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:2rem;">
          <a href="dashboard.html"      class="btn btn-ghost">📋 Lihat Semua Aspirasi</a>
          <a href="kirim-aspirasi.html" class="btn btn-primary">✍️ Kirim Lagi</a>
        </div>
      </div>
    `;
    toast('Aspirasi berhasil dikirim!', 'success');

  } else {
    // Tampilkan error
    const msg = res?.errors?.[0]?.msg || res?.message || 'Gagal mengirim aspirasi. Coba lagi.';
    errBox.textContent   = `❌ ${msg}`;
    errBox.style.display = 'block';
    btn.disabled         = false;
    btn.innerHTML        = '🚀 Kirim Aspirasi';
  }
}

// ─────────────────────────────────────────────────────────────
//  INIT — jalankan saat halaman siap
// ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initNavbar();

  if (!Auth.isLoggedIn()) {
    renderLoginWall();
  } else {
    renderForm();
  }
});
</script>

</body>
</html>
