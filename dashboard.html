<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Voiz</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html" class="navbar-brand">🎤 <span>Voiz</span></a>
  <ul class="navbar-links">
    <li><a href="dashboard.html" class="active">Semua Aspirasi</a></li>
    <li><a href="kirim-aspirasi.html">Kirim Aspirasi</a></li>
    <li><a href="#" id="myAspirasiLink">Aspirasi Saya</a></li>
  </ul>
  <div class="navbar-actions">
    <button class="btn btn-ghost btn-sm notif-btn" id="notifBtn" title="Notifikasi">
      🔔 <span id="notifBadge" class="notif-badge" style="display:none">0</span>
    </button>
    <span style="font-size:.85rem;color:var(--text-muted);" id="userGreet"></span>
    <button class="btn btn-ghost btn-sm" onclick="Auth.clear();window.location.href='login.html'">Keluar</button>
  </div>
</nav>

<!-- Notif dropdown -->
<div id="notifDropdown" class="notif-dropdown" style="display:none;"></div>

<!-- Main -->
<main class="dash-main">

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-left">
      <h2 class="dash-title">Aspirasi Mahasiswa</h2>
    </div>
    <div class="filter-right">
      <input type="search" class="form-control" id="searchInput" placeholder="🔍 Cari aspirasi…" style="width:220px;"/>
      <select class="form-control" id="filterKategori" style="width:160px;">
        <option value="">Semua Kategori</option>
      </select>
      <select class="form-control" id="filterStatus" style="width:150px;">
        <option value="">Semua Status</option>
        <option value="menunggu">Menunggu</option>
        <option value="diterima">Diterima</option>
        <option value="diproses">Diproses</option>
        <option value="selesai">Selesai</option>
        <option value="ditolak">Ditolak</option>
      </select>
      <a href="kirim-aspirasi.html" class="btn btn-primary btn-sm">+ Kirim Aspirasi</a>
    </div>
  </div>

  <!-- List Container -->
  <div id="aspirasiList" class="aspirasi-list">
    <div class="flex-center" style="padding:4rem;flex-direction:column;gap:1rem;">
      <div class="spinner" style="width:32px;height:32px;border-width:3px;"></div>
      <p class="text-muted">Memuat aspirasi…</p>
    </div>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="pagination"></div>

</main>

<!-- Modal Detail Aspirasi -->
<div id="detailModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent">Memuat…</div>
  </div>
</div>

<!-- My Aspirasi Panel (slide-in) -->
<div id="myPanel" class="side-panel" style="display:none;">
  <div class="side-panel-inner">
    <div class="side-panel-header">
      <h3>Aspirasi Saya</h3>
      <button onclick="document.getElementById('myPanel').style.display='none'">✕</button>
    </div>
    <div id="myAspirasiList"><div class="text-muted text-center" style="padding:2rem;">Memuat…</div></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/aspirasi.js"></script>
</body>
</html>
